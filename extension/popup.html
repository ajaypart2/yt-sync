<!DOCTYPE html>
<html>
<head>
    <style>
        body { width: 250px; padding: 15px; font-family: Arial, sans-serif; }
        input { width: 100%; padding: 8px; margin-bottom: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 8px; background: #333; color: white; border: none; cursor: pointer; margin-bottom: 5px;}
        #logoutBtn { background: #d32f2f; display: none; }
    </style>
</head>
<body>
    <h3>YT Sync Login</h3>
    <div id="loginForm">
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button id="loginBtn">Login</button>
        <button id="registerBtn" style="background: #0066cc;">Register</button>
    </div>
    <button id="logoutBtn">Logout</button>
    <div id="status" style="margin-top: 10px; color: green; font-size: 12px;"></div>

    <script src="popup.js"></script>
</body>
</html>
